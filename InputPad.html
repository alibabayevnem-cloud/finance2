<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;width:100vw;overflow:hidden;}
.container{width:100%;max-width:420px;height:100vh;display:flex;flex-direction:column;justify-content:space-between;padding:16px 20px 0;}
.toggle-switch{display:flex;background:#1c1c1c;border-radius:12px;padding:4px;margin-bottom:12px;}
.toggle-button{flex:1;padding:9px;border:none;border-radius:9px;background:transparent;color:#666;cursor:pointer;font-size:15px;font-weight:600;transition:all .2s;}
.toggle-button.active{background:#2c2c2c;color:#fff;}
.amount-display{text-align:center;margin:8px 0 6px;}
.amount-row{display:flex;align-items:baseline;justify-content:center;gap:4px;}
.currency{font-size:9vw;font-weight:300;opacity:.6;}
#amountText{font-size:17vw;font-weight:300;line-height:1;}
.category-select-wrapper{text-align:center;margin-bottom:8px;}
#Kateqoriya{background:#1c1c1c;color:#fff;border:none;padding:10px 38px 10px 18px;border-radius:30px;font-size:14px;appearance:none;cursor:pointer;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 12px center;min-width:200px;}
.note-wrapper{text-align:center;margin-bottom:8px;}
#noteInput{background:#1c1c1c;color:#fff;border:none;padding:9px 18px;border-radius:30px;font-size:14px;width:80%;max-width:280px;text-align:center;outline:none;}
#noteInput::placeholder{color:#555;}
.keypad-wrapper{flex-shrink:0;display:flex;justify-content:center;padding:4px 0;}
.keypad{width:100%;max-width:400px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.key{height:min(17vw,60px);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:300;border-radius:12px;background:#1c1c1c;cursor:pointer;transition:background .1s;user-select:none;-webkit-tap-highlight-color:transparent;}
.key:active{background:#3a3a3a;}
.submit-btn-wrapper{flex-shrink:0;display:flex;justify-content:center;padding:8px 0 6px;}
.submit-btn{width:62px;height:62px;border-radius:50%;border:none;background:#28a745;color:#fff;font-size:28px;cursor:pointer;display:flex;justify-content:center;align-items:center;box-shadow:0 4px 18px rgba(40,167,69,.4);transition:background .2s,transform .1s;}
.submit-btn:active{transform:scale(.94);}
.submit-btn.expense{background:#e53e3e;box-shadow:0 4px 18px rgba(229,62,62,.35);}
#statusMessage{text-align:center;padding:6px 0 4px;font-size:13px;font-weight:600;min-height:22px;color:#28a745;}
#statusMessage.err{color:#e53e3e;}

</style>

<body>
<div class="container">
  <div style="flex-shrink:0;">
    <div class="toggle-switch">
      <button type="button" class="toggle-button active" id="expenseBtn">Xərc</button>
      <button type="button" class="toggle-button" id="incomeBtn">Gəlir</button>
    </div>
    <div class="amount-display">
      <div class="amount-row"><span class="currency">₼</span><span id="amountText">0</span></div>
    </div>
    <div class="category-select-wrapper">
      <select id="Kateqoriya"><option value="" disabled selected>Kateqoriya seçin</option></select>
    </div>
    <div class="note-wrapper">
      <input type="text" id="noteInput" placeholder="Qeyd (isteğe bağlı)" maxlength="100">
    </div>
  </div>
  <div class="keypad-wrapper">
    <div class="keypad">
      <div class="key" data-v="1">1</div><div class="key" data-v="2">2</div><div class="key" data-v="3">3</div>
      <div class="key" data-v="4">4</div><div class="key" data-v="5">5</div><div class="key" data-v="6">6</div>
      <div class="key" data-v="7">7</div><div class="key" data-v="8">8</div><div class="key" data-v="9">9</div>
      <div class="key" data-v=".">.</div><div class="key" data-v="0">0</div><div class="key" data-v="del">⌫</div>
    </div>
  </div>
  <div class="submit-btn-wrapper">
    <button class="submit-btn expense" id="submitButton" onclick="submitTx()">✓</button>
  </div>
  <div id="statusMessage"></div>
</div>

    <a class="nav-item" href="settings.html"><div class="nav-icon gray">⚙</div><div class="nav-text-wrap"><span class="nav-label">Parametrlər</span><span class="nav-desc">Tənzimləmə</span></div></a>
  </div>
</div>

<script>
const DEFAULT_BASE_CAT = {
  'Xərc':  ['Komissiya','Taksit ödənişi','Kirayə','Komunnal','Kontur','İnternet','Təhsil','Siqaret','Yol','Ərzaq','Restoran','Rüsum','Təmir tikinti','Tibb','Tibb (Ana)','Ev (Quba)','İdman','Hobby','Hədiyyə','Geyim','Əşya','Digər','Toy','Əyləncə','Bərbər','Təmizlik vasitələri','İş üçün','Səyahət','Heyvan məhsulları','Bağ'],
  'Gəlir': ['Əməkhaqqı','Təqaüd','Mükafat','Məzuniyyət / Ezam','ƏDV/CashBack','Satış','Əlavə Gəlir']
};

function getCats(type) {
  // Settings-dən oxu, yoxdursa default
  let savedCats = null;
  try { savedCats = JSON.parse(localStorage.getItem('mf_cats')||'null'); } catch(e){}
  const key = type === 'Gəlir' ? 'gelir' : 'xerc';
  const base = savedCats ? (savedCats[key] || []) : (type === 'Gəlir' ? DEFAULT_BASE_CAT['Gəlir'] : DEFAULT_BASE_CAT['Xərc']);
  const list = [...base];
  return list;
}

let amt = '0';
let op  = 'Xərc';

document.querySelectorAll('.key').forEach(k => {
  k.addEventListener('click', () => {
    const v = k.getAttribute('data-v');
    if (v === 'del') { amt = amt.length > 1 ? amt.slice(0,-1) : '0'; }
    else if (v === '.') { if (!amt.includes('.')) amt += '.'; }
    else { amt = amt === '0' ? v : (amt.includes('.') && amt.split('.')[1].length >= 2 ? amt : amt + v); }
    document.getElementById('amountText').textContent = amt;
  });
});

function setOperation(type) {
  op = type;
  const isIncome = (type === 'Gəlir');
  document.getElementById('expenseBtn').className = 'toggle-button' + (!isIncome ? ' active' : '');
  document.getElementById('incomeBtn').className  = 'toggle-button' + (isIncome ? ' active' : '');
  document.getElementById('submitButton').className = 'submit-btn' + (!isIncome ? ' expense' : '');
  const sel = document.getElementById('Kateqoriya');
  const prev = sel.value;
  sel.innerHTML = '<option value="" disabled selected>Kateqoriya seçin</option>';
  getCats(type).forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; sel.appendChild(o); });
  if (prev) sel.value = prev;
}

// ── Apps Script endpoint (sync.js ilə eyni sabit) ─────────────
const _INPUT_ENDPOINT = (typeof APPS_SCRIPT_URL !== 'undefined')
  ? APPS_SCRIPT_URL
  : 'BURAYA_WEB_APP_URL_GELECEK';

// Offline queue: server əlçatmaz olduqda saxla, sonra göndər
let _offlineQueue = [];
try { _offlineQueue = JSON.parse(localStorage.getItem('_inputpad_queue') || '[]'); } catch(e) {}

function _saveQueue() {
  try { localStorage.setItem('_inputpad_queue', JSON.stringify(_offlineQueue)); } catch(e) {}
}

async function _postTx(tx) {
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), 10000);
  const r = await fetch(_INPUT_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'submit', tx }),
    signal: controller.signal,
  });
  clearTimeout(tid);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return await r.json();
}

// Offline queue-nu boşalt (internet geri gəldikdə)
async function _flushQueue() {
  if (_offlineQueue.length === 0) return;
  const pending = [..._offlineQueue];
  for (const tx of pending) {
    try {
      await _postTx(tx);
      _offlineQueue = _offlineQueue.filter(q => q.id !== tx.id);
      _saveQueue();
    } catch(e) { break; }
  }
}
window.addEventListener('online', _flushQueue);

function submitTx() {
  const a = parseFloat(amt);
  const cat = document.getElementById('Kateqoriya').value;
  if (!a || a <= 0) { showStatus('Məbləğ daxil edin', true); return; }
  if (!cat)         { showStatus('Kateqoriya seçin', true); return; }

  const today = new Date().toISOString().split('T')[0];
  const note  = document.getElementById('noteInput').value.trim();

  // Unikal id: timestamp + random
  const txId = String(Date.now()) + Math.random().toString(36).slice(2, 7);

  const tx = {
    id:         txId,
    createdAt:  new Date().toISOString(),
    Tarix:      today,
    Emeliyyat:  op,
    Kateqoriya: cat,
    Qeyd:       note,
    Mebleg:     String(a),
    source:     'inputpad_mobile',
    status:     'new',
  };

  // UI sıfırla
  amt = '0';
  document.getElementById('amountText').textContent = '0';
  document.getElementById('Kateqoriya').value = '';
  document.getElementById('noteInput').value = '';

  if (!_INPUT_ENDPOINT || _INPUT_ENDPOINT === 'BURAYA_WEB_APP_URL_GELECEK') {
    // Endpoint konfiq edilməyib — developer rejimi
    showStatus('⚠ Endpoint konfiq edilməyib', true);
    return;
  }

  // ── Remote endpoint ──
  if (!_INPUT_ENDPOINT || _INPUT_ENDPOINT === 'BURAYA_WEB_APP_URL_GELECEK') {
    showStatus('⚠ Endpoint konfiq edilməyib', true);
    return;
  }

  showStatus('⏳ Göndərilir...', false);

  _postTx(tx).then(() => {
    showStatus('✓ Göndərildi', false);
    _flushQueue();
  }).catch(err => {
    console.warn('[InputPad] POST xəta:', err.message, '— offline queue-ya əlavə edildi');
    _offlineQueue.push(tx);
    _saveQueue();
    showStatus('📵 Offline — saxlandı', false);
  });
}

function showStatus(msg, isErr) {
  const el = document.getElementById('statusMessage');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.textContent = '', 3000);
}

function init() {
  document.getElementById('expenseBtn').addEventListener('click', function(){ setOperation('X\u0259rc'); });
  document.getElementById('incomeBtn').addEventListener('click', function(){ setOperation('G\u0259lir'); });
  setOperation('X\u0259rc');
}
document.addEventListener('DOMContentLoaded', init);
window.addEventListener('gist-ready', init, { once: true });
window.addEventListener('storage', e => { if (e.key==='kreditler_v2') setOperation(op); if (e.key==='mf_cats') setOperation(op); });

</script>
